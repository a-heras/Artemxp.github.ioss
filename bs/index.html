<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Business Shots</title>
</head>
<body>
    <div class="container">
        <div class="overlay"></div>
        <div class="popup-modal"></div>

        <!-- Шаблоны -->
        <div class="wrapper-call-me">
            <div class="call-me">
                <div class="close"><img src="img/close.png" alt="x"></div>
                <div class="wrapper-caption">
                    <span>ЗАКАЗ ОБРАТНОГО ЗВОНКА</span>
                </div>
                <form class="form-call-me">
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="tel" placeholder="Телефон" required>
                    <button type="submit">ПЕРЕЗВОНИТЕ МНЕ</button>
                </form>
            </div>
        </div>

        <div class="wrapper-get-price">
            <div class="call-me">
                <div class="close"><img src="img/close.png" alt="x"></div>
                <div class="wrapper-caption">
                    <span>УЗНАТЬ СТОИМОСТЬ</span>
                </div>
                <form class="form-call-me">
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="email" placeholder="E-mail" required>
                    <textarea placeholder="Ваш проект"></textarea>
                    <button type="submit">ПОЛУЧИТЬ РАСЧЕТ</button>
                </form>
            </div>
        </div>

        <div class="wrapper-player">
            <div class="player">
                <iframe src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <header>
            <div class="header-content">
                <nav class="nav-menu-content">
                    <ul class="nav-menu">
                        <li><a href="#">Главная</a></li>
                        <li><button type="button" class="button-call-me">ПЕРЕЗВОНИТЕ МНЕ</button></li>
                    </ul>
                </nav>
                <div class="logo">
                    <img src="img/logo.png" alt="">
                    <p>МЫ СОЗДАЕМ КОММЕРЧЕСКИЕ ВИДЕО</p>
                </div>
                <div class="price">
                    <button class="button-price" type="button">УЗНАТЬ СТОИМОСТЬ</button>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="wrapper-content">
                <div class="relation__content">
                    <div class="big">
                        <div class="play" data-video="https://youtube.com"></div>
                        <div class="big-text"><p>VIDEO ONE</p></div>
                    </div>
                    <div class="big">
                        <div class="play" data-video="https://youtube.com"></div>
                        <div class="big-text"><p>VIDEO TWO</p></div>
                    </div>
                    <div class="big">
                        <div class="play" data-video="https://youtube.com"></div>
                        <div class="big-text"><p>VIDEO THREE</p></div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>shots.mscw@gmail.com</p>
            <span>8(999)862-76-93</span>
        </footer>
    </div>

    <script src="https://jquery.com"></script>
    <script src="script.js"></script>
</body>
</html>
